<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyan Logic - Digital Atrium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Import Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyan: {
                            50: '#f0fdfc', 100: '#ccfbf8', 200: '#99f6f0', 300: '#5eead6', 400: '#2dd4c2', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', 800: '#115e59', 900: '#134e4a',
                        },
                        surface: '#f3f7f7',
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        display: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(13, 148, 136, 0.08)',
                        'float': '0 20px 40px -10px rgba(0, 0, 0, 0.08)',
                        'heavy-float': '0 30px 60px -15px rgba(13, 148, 136, 0.15)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f3f7f7;
        }
        .bg-grid-pattern {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* ISOMETRIC CSS */
        .isometric-container {
            perspective: 2000px;
            transform-style: preserve-3d;
        }
        .isometric-world {
            /* Isometric Projection */
            transform: rotateX(60deg) rotateZ(-45deg);
            transform-style: preserve-3d;
            transition: transform 1s ease-in-out;
        }
        
        .iso-floor {
            width: 700px;
            height: 700px;
            background: rgba(13, 148, 136, 0.05);
            border: 2px dashed rgba(13, 148, 136, 0.2);
            position: absolute;
            transform-style: preserve-3d;
            border-radius: 20px;
            box-shadow: inset 0 0 50px rgba(13, 148, 136, 0.1);
            cursor: pointer;
        }

        /* 3D Cabinet Box */
        .iso-archive {
            position: absolute;
            top: -80px;
            left: -80px;
            width: 450px;
            height: 450px;
            transform: translateZ(40px) rotateZ(45deg) rotateX(-60deg);
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        /* 3D Agent (Model Viewer Container) */
        .iso-agent {
            position: absolute;
            top: 400px;
            left: 380px;
            width: 120px;
            height: 120px;
            /* Billboard effect to face camera despite world rotation */
            transform: translateZ(60px) rotateZ(45deg) rotateX(-60deg);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .iso-agent.selected {
            filter: drop-shadow(0 0 15px rgba(6, 182, 212, 0.8));
        }

        .selection-ring {
            position: absolute;
            width: 140px;
            height: 140px;
            border: 4px solid #06b6d4;
            border-radius: 50%;
            opacity: 0;
            transform: translateZ(-10px) scale(0.8);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .iso-agent.selected .selection-ring {
            opacity: 1;
            transform: translateZ(-10px) scale(1.1);
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(6, 182, 212, 0); }
            100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); }
        }

        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
            /* Add drop shadow effect to the 3d model container to ground it */
            filter: drop-shadow(0px 20px 10px rgba(0,0,0,0.3));
            /* Chặn mọi tương tác chuột trên model-viewer để tránh zoom/xoay */
            pointer-events: none;
        }

        #editor-content { opacity: 0; pointer-events: none; transition: opacity 0.5s, transform 0.5s; transform: translateY(20px); }
        #editor-content.active { opacity: 1; pointer-events: auto; transform: translateY(0); }

        .world-shifted {
            transform: rotateX(60deg) rotateZ(-45deg) scale(0.45) translateX(550px) translateY(-280px);
            opacity: 0.3;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col font-sans text-slate-800 relative bg-grid-pattern selection:bg-cyan-500/30">

    <header class="h-24 w-full flex items-center justify-between px-8 z-30 bg-transparent shrink-0">
        <div class="flex items-center w-[250px] shrink-0">
            <div class="w-10 h-10 bg-cyan-600 rounded-[12px] flex items-center justify-center mr-3 shadow-md">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
            </div>
            <div>
                <h1 class="font-display font-bold text-[1.1rem] text-cyan-600 tracking-tight leading-tight">Cyan Logic</h1>
                <p class="text-[0.6rem] font-semibold text-slate-400 tracking-widest uppercase">System V1.0.4</p>
            </div>
        </div>

        <nav class="flex items-center gap-10">
            <button class="text-[0.95rem] font-medium text-slate-500 hover:text-slate-800 transition-colors">Dashboard</button>
            <div class="relative flex flex-col items-center">
                <button class="text-[0.95rem] font-bold text-cyan-700 pb-1">Docs</button>
                <div class="absolute -bottom-[26px] w-12 h-[3px] bg-cyan-600 rounded-t-md"></div>
            </div>
            <button class="text-[0.95rem] font-medium text-slate-500 hover:text-slate-800 transition-colors">Tools</button>
            <button class="text-[0.95rem] font-medium text-slate-500 hover:text-slate-800 transition-colors">Images</button>
        </nav>

        <div class="flex items-center justify-end gap-4 w-[250px] shrink-0">
            <div class="relative hidden xl:block">
                <svg class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" placeholder="Tìm kiếm..." class="pl-10 pr-4 py-2 w-48 rounded-full bg-white/60 border border-white/80 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 text-[0.85rem] font-medium text-slate-700 placeholder-slate-500 shadow-sm">
            </div>
            <button class="w-9 h-9 rounded-full flex items-center justify-center text-slate-500 hover:text-cyan-600 glass-panel transition-colors">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/></svg>
            </button>
            <div class="h-8 w-px bg-slate-300/50 mx-1"></div>
            <button class="w-9 h-9 rounded-xl bg-slate-800 flex items-center justify-center overflow-hidden hover:ring-2 ring-cyan-500/50 transition-all shadow-md">
                <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden relative px-8 pb-8 gap-6">

        <!-- Panel 1: Sidebar Trái -->
        <aside class="w-[240px] h-full flex flex-col py-6 px-3 z-20 glass-panel rounded-[1.5rem] shadow-float shrink-0">
            <p class="text-[0.65rem] font-bold text-slate-500 tracking-widest uppercase mb-4 px-3">Cấu trúc tài liệu</p>
            <nav class="flex-1 space-y-1">
                <button class="w-full text-left flex items-center px-3 py-2.5 rounded-xl hover:bg-white/60 transition-colors text-slate-600 font-medium text-sm">
                    <svg class="w-4 h-4 mr-3 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                    Getting Started
                </button>
                <button onclick="togglePanel2()" class="w-full text-left flex items-center px-3 py-2.5 rounded-xl bg-white/80 text-cyan-700 font-semibold text-sm relative shadow-sm transition-all cursor-pointer border border-white">
                    <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-5 bg-cyan-600 rounded-r-full"></div>
                    <svg class="w-4 h-4 mr-3" fill="currentColor" viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.9 2-2V8c0-1.11-.9-2-2-2zm0 12H4V8h16v10z"></path></svg>
                    Architecture
                </button>
                <button class="w-full text-left flex items-center px-3 py-2.5 rounded-xl hover:bg-white/60 transition-colors text-slate-600 font-medium text-sm">
                    <svg class="w-4 h-4 mr-3 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                    API References
                </button>
            </nav>
        </aside>

        <!-- Panel 2 -->
        <div id="secondary-panel" class="w-[340px] h-full glass-panel rounded-[1.5rem] shadow-float z-20 flex flex-col overflow-hidden transition-all duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] translate-x-0 opacity-100 shrink-0 border border-white">
            <div class="px-6 pt-6 pb-4 flex justify-between items-center">
                <h3 class="font-display text-lg font-bold text-cyan-700">Architecture</h3>
                <button onclick="togglePanel2()" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/50 transition-colors text-slate-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto px-4 pb-6 space-y-2 mt-2">
                <div onclick="openDocument('The No-Line Rule')" class="group flex items-center px-4 py-3 rounded-[1rem] bg-white/40 hover:bg-white/70 shadow-sm border border-white/50 hover:border-white cursor-pointer transition-all">
                    <div class="w-9 h-9 rounded-xl bg-white flex items-center justify-center mr-3 text-cyan-600 shrink-0 shadow-sm">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold text-cyan-800 truncate">The "No-Line" Rule</p>
                        <p class="text-[0.65rem] text-slate-500 mt-0.5">Click để mở tài liệu</p>
                    </div>
                </div>

                <div onclick="openDocument('Surface Hierarchy')" class="group flex items-center px-4 py-3 rounded-[1rem] hover:bg-white/50 hover:shadow-sm transition-all duration-300 cursor-pointer">
                    <div class="w-9 h-9 rounded-xl bg-white/60 flex items-center justify-center mr-3 text-cyan-600 shrink-0">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold text-slate-600 group-hover:text-cyan-700 truncate transition-colors">Surface Hierarchy</p>
                    </div>
                </div>
            </div>

            <div class="p-4 mt-auto border-t border-white/40 bg-white/30 backdrop-blur-md">
                <button class="w-full py-3 rounded-xl bg-gradient-to-r from-cyan-600 to-cyan-500 text-white font-bold text-sm shadow-[0_8px_16px_-4px_rgba(13,148,136,0.3)] hover:scale-[1.02] transition-transform flex justify-center items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
                    Tài liệu mới
                </button>
            </div>
        </div>

        <!-- RIGHT AREA: 3D Isometric View OR Editor Content -->
        <main class="flex-1 relative overflow-hidden flex items-center justify-center">
            
            <!-- THE 3D ISOMETRIC EMPTY STATE -->
            <div id="isometric-view" class="absolute inset-0 flex items-center justify-center isometric-container z-10 transition-all duration-1000">
                <div id="isometric-world" class="isometric-world w-[700px] h-[700px] relative">
                    <!-- Floor grid -->
                    <div class="iso-floor flex items-center justify-center" onclick="moveAgent(event)">
                        <p class="text-cyan-700/30 font-display font-bold text-2xl transform rotate-90 -translate-x-12 opacity-50 pointer-events-none">KHU VỰC TÀI LIỆU</p>
                    </div>
                    
                    <!-- The Archive 3D Model -->
                    <div class="iso-archive">
                        <model-viewer 
                            src="/models/Meshy_AI_The_Lanterned_Archive_0414101610_texture.glb" 
                            alt="3D Archive"
                            disable-zoom="true"
                            disable-tap="true"
                            disable-pan="true"
                            interaction-prompt="none"
                            shadow-intensity="1">
                        </model-viewer>
                    </div>

                    <!-- Chibi Model 2 -->
                    <div id="chibi-agent" class="iso-agent" onclick="toggleAgentSelection(event)">
                        <div class="selection-ring"></div>
                        <model-viewer id="chibi-model"
                            src="/models/Meshy_AI_Bamboo_Chef_Chibi_biped_Animation_Walking_withSkin.glb" 
                            alt="3D AI Agent"
                            camera-orbit="0deg 75deg 2m"
                            min-camera-orbit="0deg 75deg 2m"
                            max-camera-orbit="0deg 75deg 2m"
                            disable-zoom="true"
                            disable-tap="true"
                            disable-pan="true"
                            interaction-prompt="none"
                            shadow-intensity="1"
                            autoplay="true">
                        </model-viewer>
                    </div>
                </div>
            </div>

            <!-- ACTUAL EDITOR CONTENT -->
            <article id="editor-content" class="max-w-4xl w-full mx-auto glass-panel p-12 rounded-[1.5rem] shadow-heavy-float relative z-20 overflow-y-auto h-full border border-white hidden-initially">
                <div class="flex justify-between items-center mb-6">
                    <div class="inline-block px-3 py-1 rounded-full bg-cyan-100/80 text-cyan-700 text-[0.65rem] font-bold tracking-widest uppercase border border-cyan-200">
                        Documentation
                    </div>
                    <button onclick="closeDocument()" class="px-4 py-1.5 rounded-full bg-slate-200/50 hover:bg-slate-300 text-slate-600 text-xs font-bold transition-colors">
                        Đóng tài liệu
                    </button>
                </div>
                
                <h1 id="doc-title" class="font-display text-4xl font-bold text-slate-800 mb-6 tracking-tight">Tên tài liệu</h1>
                
                <p class="text-lg text-slate-600 leading-relaxed mb-8">
                    Tài liệu này đã được lấy ra từ tủ lưu trữ (Archive) bởi Agent 3D. 
                </p>

                <div class="h-px w-full bg-slate-300/50 mb-8"></div>

                <h2 class="font-display text-xl font-bold text-slate-800 mb-4">Nội dung chi tiết</h2>
                <div class="w-full h-32 bg-white/50 rounded-xl border border-slate-200/50 flex items-center justify-center text-slate-400 mb-4">
                    [ Nội dung mô phỏng ]
                </div>
                <div class="w-full h-16 bg-white/50 rounded-xl border border-slate-200/50"></div>
            </article>

        </main>
    </div>

    <!-- Agent Chat -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 glass-panel pl-4 pr-3 py-3 rounded-2xl shadow-heavy-float z-30 flex items-center gap-4 w-[600px] border border-white pointer-events-auto">
        <div class="w-8 h-8 rounded-full bg-cyan-100 flex items-center justify-center text-cyan-600 shrink-0">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z" opacity="0.3"/><path d="M10.5 14l-1.5-.5-1.5.5c-1.46.18-2.67 1.22-3.06 2.61L4 18l.44 1.39c.39 1.39 1.6 2.43 3.06 2.61l1.5.19 1.5-.19c1.46-.18 2.67-1.22 3.06-2.61L10.5 11l-1.5.5z"/></svg>
        </div>
        <input type="text" placeholder="Hỏi AI hoặc nhập lệnh để chỉnh sửa tài liệu..." class="flex-1 bg-transparent text-[0.85rem] font-medium text-slate-700 outline-none placeholder-slate-400">
        <button class="px-5 py-2 rounded-xl bg-cyan-600 text-white text-xs font-bold shadow-md hover:bg-cyan-500 transition-colors">
            Gửi lệnh
        </button>
    </div>

    <script>
        let isAgentSelected = false;

        function togglePanel2() {
            const panel = document.getElementById('secondary-panel');
            if (panel.classList.contains('translate-x-0')) {
                panel.classList.remove('translate-x-0', 'opacity-100', 'w-[340px]');
                panel.classList.add('-translate-x-10', 'opacity-0', 'w-0', 'pointer-events-none');
            } else {
                panel.classList.remove('-translate-x-10', 'opacity-0', 'w-0', 'pointer-events-none');
                panel.classList.add('translate-x-0', 'opacity-100', 'w-[340px]');
            }
        }

        function toggleAgentSelection(e) {
            e.stopPropagation();
            isAgentSelected = !isAgentSelected;
            const agent = document.getElementById('chibi-agent');
            if (isAgentSelected) {
                agent.classList.add('selected');
            } else {
                agent.classList.remove('selected');
            }
        }

        // Logic tương tác di chuyển Agent 3D
        function moveAgent(e) {
            if (!isAgentSelected) return;

            const agent = document.getElementById('chibi-agent');
            const modelViewer = document.getElementById('chibi-model');
            
            const x = e.offsetX;
            const y = e.offsetY;

            // Offset to center the agent on click (agent width/height = 180)
            agent.style.left = (x - 90) + 'px';
            agent.style.top = (y - 90) + 'px';
            
            modelViewer.src = '/models/Meshy_AI_Bamboo_Chef_Chibi_biped_Animation_Running_withSkin.glb';
            
            if (agent.moveTimeout) clearTimeout(agent.moveTimeout);
            agent.moveTimeout = setTimeout(() => {
                modelViewer.src = '/models/Meshy_AI_Bamboo_Chef_Chibi_biped_Animation_Walking_withSkin.glb';
                // Deselect after moving
                isAgentSelected = false;
                agent.classList.remove('selected');
            }, 800);
        }

        function openDocument(title) {
            const agent = document.getElementById('chibi-agent');
            const modelViewer = document.getElementById('chibi-model');
            const world = document.getElementById('isometric-world');
            const editor = document.getElementById('editor-content');
            const titleEl = document.getElementById('doc-title');

            titleEl.innerText = title;

            // Đổi qua animation chạy và thay đổi tọa độ về phía tủ (Tủ đang ở -60, -60)
            modelViewer.src = '/models/Meshy_AI_Bamboo_Chef_Chibi_biped_Animation_Running_withSkin.glb';
            agent.style.left = '30px';
            agent.style.top = '30px';

            setTimeout(() => {
                world.classList.add('world-shifted');
                editor.classList.add('active');
            }, 800);
        }

        function closeDocument() {
            const agent = document.getElementById('chibi-agent');
            const modelViewer = document.getElementById('chibi-model');
            const world = document.getElementById('isometric-world');
            const editor = document.getElementById('editor-content');

            editor.classList.remove('active');
            world.classList.remove('world-shifted');

            // Chạy lùi về chỗ cũ (ở giữa phòng)
            setTimeout(() => {
                agent.style.left = '380px';
                agent.style.top = '400px';
                modelViewer.src = '/models/Meshy_AI_Bamboo_Chef_Chibi_biped_Animation_Walking_withSkin.glb';
            }, 500);
        }
    </script>
</body>
</html>
